<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0b0e20">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>FocusGrid Planner</title>
    <style>
        /* ================= THEME & BASICS ================= */
        :root {
            --bg-color: #0b0e20; --card-bg: #151a30; --border-color: #2a3258; 
            --primary: #2a64f6; --danger: #ff3b30; --success: #00d084; 
            --text-main: #ffffff; --text-muted: #808aab;
        }
        body { margin: 0; padding: 0; padding-bottom: 80px; font-family: system-ui, sans-serif; background: var(--bg-color); color: var(--text-main); -webkit-tap-highlight-color: transparent; }
        * { box-sizing: border-box; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .app-view { display: none; padding: 15px; width: 100%; min-height: calc(100vh - 80px); animation: fadeIn 0.3s ease; }
        .app-view.active { display: block; }

        /* ================= BOTTOM NAV ================= */
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; height: 65px; background: rgba(11, 14, 32, 0.95); backdrop-filter: blur(10px); border-top: 1px solid var(--border-color); display: flex; justify-content: space-around; align-items: center; z-index: 1000; padding: 0 5px; }
        .nav-btn { flex: 1; border: none; background: transparent; font-size: 11px; font-weight: 700; color: var(--text-muted); cursor: pointer; transition: 0.3s; display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 10px 0; text-transform: uppercase; }
        .nav-btn span { font-size: 18px; filter: grayscale(100%) opacity(0.5); }
        .nav-btn.active { color: var(--primary); }
        .nav-btn.active span { filter: grayscale(0%) opacity(1); }

        /* ================= COMPONENTS ================= */
        .card { background: var(--card-bg); border-radius: 16px; padding: 20px; border: 1px solid var(--border-color); margin-bottom: 20px; }
        .card-title { margin: 0 0 15px 0; font-size: 1.1rem; font-weight: 800; text-transform: uppercase; }
        .btn { padding: 12px 18px; border: none; border-radius: 10px; color: #fff; cursor: pointer; font-weight: 600; font-size: 14px; text-transform: uppercase; }
        .btn-reset { background: rgba(255,59,48,0.1); color: var(--danger); border: 1px solid rgba(255,59,48,0.3); }
        .btn-add { background: var(--primary); }
        .btn-save { background: var(--success); color: #000; width: 100%; margin-bottom: 10px; }
        .btn-clear { background: rgba(255,59,48,0.1); color: var(--danger); width: 100%; margin-bottom: 10px; border: 1px solid var(--danger); }
        .header-action { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; flex-wrap: wrap; gap: 8px;}
        .input-group { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .input-group input { flex: 1; padding: 14px; border: 1px solid var(--border-color); border-radius: 12px; font-size: 15px; background: var(--bg-color); color: var(--text-main); outline: none; }
        
        /* ================= PLANNER ================= */
        table { width: 100%; border-collapse: collapse; min-width: 600px; text-align: center; }
        .table-wrapper { overflow-x: auto; border-radius: 12px; border: 1px solid var(--border-color); }
        th, td { border: 1px solid var(--border-color); padding: 8px 5px; height: 45px; font-size: 13px; }
        th { background: var(--card-bg); position: sticky; top: 0; font-size: 11px; }
        .cell { cursor: pointer; font-weight: 600; }
        .cell.bulk-selected { outline: 3px solid var(--primary); background: rgba(42, 100, 246, 0.3); }
        .bulk-action-panel { display: none; position: fixed; bottom: 75px; left: 50%; transform: translateX(-50%); z-index: 1500; background: var(--card-bg); border: 2px solid var(--primary); padding: 15px; border-radius: 16px; width: 90%; max-width: 350px; text-align: center; }
        .tag-inputs { display: flex; gap: 10px; margin-bottom: 15px; }
        .tag-inputs input[type="color"] { width: 45px; height: 45px; padding: 2px; }
        .tag-item { padding: 6px 14px; border-radius: 20px; font-size: 12px; display: flex; align-items: center; gap: 8px; border: 1px solid var(--border-color); background: rgba(255,255,255,0.05); }
        .tag-delete { cursor: pointer; color: var(--danger); background: none; border: none; font-weight: bold; }

        /* ================= TIMER ================= */
        .tt-top-bar { background: rgba(42, 100, 246, 0.1); border: 1px solid rgba(42, 100, 246, 0.3); border-radius: 12px; padding: 12px; text-align: center; margin-bottom: 25px; }
        .ring-container { position: relative; width: 240px; height: 240px; margin: 0 auto 30px; display: flex; justify-content: center; align-items: center; }
        .svg-ring { width: 100%; height: 100%; transform: rotate(-90deg); position: absolute; top: 0; left: 0; }
        .ring-track { fill: none; stroke: var(--bg-color); stroke-width: 10; }
        .ring-progress { fill: none; stroke: var(--success); stroke-width: 10; stroke-linecap: round; stroke-dasharray: 710; transition: 0.5s linear; }
        .tt-display { font-size: 2.8rem; font-weight: 800; }
        .tt-controls { display: flex; gap: 15px; justify-content: center; margin-bottom: 30px; }
        #tt-btn-start { background: var(--success); color: #000; }
        #tt-btn-pause { background: var(--primary); }
        .tt-log-item { display: flex; justify-content: space-between; background: var(--bg-color); border: 1px solid var(--border-color); padding: 12px; border-radius: 12px; margin-bottom: 10px; }

        /* ================= LISTS & NOTES ================= */
        .list-item { display: flex; justify-content: space-between; padding: 16px; background: var(--bg-color); border-radius: 14px; border: 1px solid var(--border-color); margin-bottom: 10px;}
        .list-item.completed .item-text { text-decoration: line-through; color: var(--text-muted); }
        .custom-checkbox { width: 24px; height: 24px; border: 2px solid var(--text-muted); border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .list-item.completed .custom-checkbox { background: var(--success); border-color: var(--success); }
        .custom-checkbox::after { content: '✔'; color: #000; font-size: 12px; opacity: 0; }
        .list-item.completed .custom-checkbox::after { opacity: 1; }
        .item-delete { background: rgba(255,59,48,0.1); border: none; color: var(--danger); width: 34px; height: 34px; border-radius: 10px; cursor: pointer; }

        /* Visual Editor Tools */
        .btn-tool { padding: 8px 12px; background: var(--card-bg); border: 1px solid var(--border-color); color: var(--text-main); border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: bold; white-space: nowrap; }
        .btn-tool:active { background: var(--border-color); }
        [contenteditable="true"]:empty:before { content: attr(placeholder); color: var(--text-muted); }
        
        #note-input h3, .note-text h3 { margin: 5px 0; color: var(--primary); font-size: 1.2rem; }
        #note-input h4, .note-text h4 { margin: 5px 0; color: var(--success); font-size: 1.1rem; }
        #note-input ul, #note-input ol, .note-text ul, .note-text ol { margin: 5px 0 5px 25px; padding: 0; }
        #note-input li, .note-text li { margin-bottom: 4px; }

        .note-card { background: rgba(255,255,255,0.03); border: 1px solid var(--border-color); border-radius: 12px; padding: 15px; margin-bottom: 12px; position: relative; }
        .note-text { font-size: 14px; white-space: pre-wrap; margin-right: 30px;}
        .note-actions { position: absolute; top: 12px; right: 12px; display: flex; gap: 8px; }
        
        /* Modal */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); backdrop-filter: blur(5px); z-index: 2000; justify-content: center; align-items: center; }
        .modal { background: var(--card-bg); padding: 25px; border-radius: 20px; width: 320px; border: 1px solid var(--border-color); }
        .modal input, .modal select { width: 100%; padding: 12px; margin-bottom: 20px; border-radius: 10px; border: 1px solid var(--border-color); background: var(--bg-color); color: white; }
    </style>
</head>
<body>

    <!-- PLANNER TAB -->
    <div id="view-planner" class="app-view active">
        <div class="card">
            <div class="header-action">
                <h3 class="card-title">📅 Planner</h3>
                <div style="display: flex; gap: 8px;">
                    <button class="btn" id="wpk-bulkBtn" style="background:var(--border-color); padding: 6px 12px; font-size: 11px;">Bulk: OFF</button>
                    <button class="btn btn-reset" id="wpk-resetBtn" style="padding: 6px 12px; font-size: 11px;">Reset</button>
                </div>
            </div>
            <div class="table-wrapper">
                <table id="wpk-weekTable"><thead><tr id="wpk-tableHeader"><th>Time</th></tr></thead><tbody id="wpk-tableBody"></tbody></table>
            </div>
        </div>

        <div class="card">
            <h3 class="card-title">🏷️ Custom Tags</h3>
            <div class="tag-inputs">
                <input type="text" id="wpk-newTagName" placeholder="Tag Name...">
                <input type="color" id="wpk-newTagColor" value="#2a64f6">
                <button class="btn btn-add" id="wpk-addTagBtn">Add</button>
            </div>
            <div class="tag-list" id="wpk-tagsContainer"></div>
        </div>

        <!-- Cloud Sync & Backup -->
        <div class="card">
            <h3 class="card-title">☁️ Cloud Sync (KVDB)</h3>
            <input type="text" id="kvdb-bucket-id" placeholder="Paste KVDB Bucket ID..." style="width:100%; padding:14px; border-radius:10px; background:var(--bg-color); color:white; border:1px solid var(--border-color); margin-bottom:15px; outline:none;">
            <div style="display: flex; gap: 10px;">
                <button class="btn btn-add" id="cloud-save-btn" style="flex: 1;">Save to Cloud</button>
                <button class="btn btn-save" id="cloud-load-btn" style="flex: 1;">Load Data</button>
            </div>
        </div>
    </div>

    <!-- TIMER TAB -->
    <div id="view-timer" class="app-view">
        <div class="card">
            <div class="tt-top-bar"><span class="tt-top-label">Day ends in:</span><span id="tt-midnight-timer">00:00:00</span></div>
            <div class="header-action"><h3 class="card-title" style="margin:0;">🎯 Timer</h3><button class="btn btn-reset" id="tt-btn-clear-all" style="padding: 6px 12px;">Clear</button></div>
            <div class="tt-setup" id="tt-setup-panel"><input type="number" id="tt-target-hours" placeholder="Hours" min="0.1" step="0.1"><button class="btn btn-add" id="tt-btn-set-target">Set Target</button></div>
            
            <div id="tt-active-panel" style="display: none; margin-top: 20px;">
                <div class="ring-container">
                    <svg class="svg-ring" viewBox="0 0 240 240"><circle class="ring-track" cx="120" cy="120" r="113"></circle><circle class="ring-progress" id="tt-ring-bar" cx="120" cy="120" r="113"></circle></svg>
                    <div class="tt-display-wrap">
                        <div class="tt-display" id="tt-time-display">00:00:00</div>
                        <div class="tt-display-label">Remaining</div>
                    </div>
                </div>
                <div class="tt-controls">
                    <button class="btn" id="tt-btn-start">Start</button>
                    <button class="btn" id="tt-btn-pause" disabled>Pause & Save</button>
                </div>
                <div class="tt-logs"><div id="tt-log-list"></div></div>
            </div>
        </div>
    </div>

    <!-- TODO & NOTES TAB -->
    <div id="view-todo" class="app-view">
        <!-- Syllabus Tracker -->
        <div class="card">
            <h3 class="card-title">📚 Syllabus Tracker</h3>
            <div class="input-group">
                <input type="text" id="syll-topic" placeholder="Topic Name...">
                <input type="number" id="syll-hours" placeholder="Hrs" style="max-width: 70px;">
                <button class="btn btn-add" id="syll-add-btn">Add</button>
            </div>
            <div id="syll-list"></div>
        </div>

        <!-- To-Do List -->
        <div class="card">
            <div class="header-action"><h3 class="card-title" style="margin:0;">📝 To-Do</h3></div>
            <div class="input-group"><input type="text" id="todo-input" placeholder="Task..."><button class="btn btn-add" id="todo-add-btn">Add</button></div>
            <div id="todo-list-container"></div>
        </div>
        
        <!-- VISUAL EDITOR NOTES -->
        <div class="card">
            <h3 class="card-title" style="margin-bottom:5px;">🗒️ Visual Notes</h3>
            <p style="font-size:12px; color:var(--text-muted); margin-bottom:15px;">Text select karo aur tools use karo.</p>
            
            <div style="display:flex; gap:6px; margin-bottom:10px; overflow-x:auto; padding-bottom:5px;">
                <!-- onmousedown preventDefault is the magic fix for buttons -->
                <button class="btn-tool" onmousedown="event.preventDefault(); document.execCommand('formatBlock', false, 'H3')">H3</button>
                <button class="btn-tool" onmousedown="event.preventDefault(); document.execCommand('formatBlock', false, 'H4')">H4</button>
                <div style="min-width:1px; background:var(--border-color); margin:0 2px;"></div>
                <button class="btn-tool" onmousedown="event.preventDefault(); document.execCommand('bold', false, null)"><b>B</b></button>
                <button class="btn-tool" onmousedown="event.preventDefault(); document.execCommand('italic', false, null)"><i>I</i></button>
                <button class="btn-tool" onmousedown="event.preventDefault(); document.execCommand('underline', false, null)"><u>U</u></button>
                <button class="btn-tool" onmousedown="event.preventDefault(); document.execCommand('strikeThrough', false, null)"><s>S</s></button>
                <div style="min-width:1px; background:var(--border-color); margin:0 2px;"></div>
                <button class="btn-tool" onmousedown="event.preventDefault(); document.execCommand('insertUnorderedList', false, null)">• List</button>
                <button class="btn-tool" onmousedown="event.preventDefault(); document.execCommand('insertOrderedList', false, null)">1. List</button>
                <div style="min-width:1px; background:var(--border-color); margin:0 2px;"></div>
                <button class="btn-tool" onmousedown="event.preventDefault(); document.execCommand('foreColor', false, '#ff3b30')" style="color:#ff3b30;">🔴</button>
                <button class="btn-tool" onmousedown="event.preventDefault(); document.execCommand('foreColor', false, '#00d084')" style="color:#00d084;">🟢</button>
                <button class="btn-tool" onmousedown="event.preventDefault(); document.execCommand('foreColor', false, '#2a64f6')" style="color:#2a64f6;">🔵</button>
                <button class="btn-tool" onmousedown="event.preventDefault(); document.execCommand('foreColor', false, '#ffff00')" style="color:#ffff00;">🟡</button>
                <button class="btn-tool" onmousedown="event.preventDefault(); document.execCommand('foreColor', false, '#ffffff')" style="color:#ffffff;">⚪</button>
            </div>

            <div style="display:flex; flex-direction:column; gap:10px;">
                <div id="note-input" contenteditable="true" placeholder="Type here..." style="width:100%; min-height:120px; padding:15px; border:1px solid var(--border-color); border-radius:12px; background:var(--bg-color); color:var(--text-main); font-size:15px; outline:none; overflow-wrap: break-word;"></div>
                <button class="btn btn-add" id="note-add-btn">Save Note</button>
            </div>
            <div id="notes-list-container" style="margin-top: 15px;"></div>
        </div>
    </div>

    <!-- REVISION TAB -->
    <div id="view-srs" class="app-view">
        <div class="card">
            <div class="header-action"><h3 class="card-title" style="margin:0;">🧠 Revision</h3></div>
            <div class="input-group">
                <input type="text" id="srs-input" placeholder="Topic...">
                <input type="date" id="srs-custom-date">
                <button class="btn btn-add" id="srs-add-btn">Add</button>
            </div>
            <div id="srs-list-container"></div>
        </div>
    </div>

    <!-- MODALS & NAV -->
    <div class="bulk-action-panel" id="wpk-bulkActionPanel">
        <span id="bulkCountText" style="display:block; margin-bottom:12px; font-weight:bold; color:var(--primary);">0 Selected</span>
        <div style="display: flex; gap: 10px;">
            <button class="btn btn-add" id="wpk-bulkEditPopupBtn" style="flex:1;">Edit</button>
            <button class="btn btn-clear" id="wpk-bulkCancelBtn" style="flex:1;">Cancel</button>
        </div>
    </div>

    <div class="modal-overlay" id="wpk-modal"><div class="modal"><h3 id="wpk-modalTitle" style="text-align:center;">Edit</h3><input type="text" id="wpk-cellTask" placeholder="Task..."><select id="wpk-cellTag"></select><button class="btn btn-save" id="wpk-saveBtn">Save</button><button class="btn btn-clear" id="wpk-clearBtn">Clear</button><button class="btn btn-close" id="wpk-closeBtn">Cancel</button></div></div>

    <nav class="bottom-nav">
        <button class="nav-btn active" onclick="switchTab('planner', this)"><span>📅</span> Planner</button>
        <button class="nav-btn" onclick="switchTab('timer', this)"><span>⏱️</span> Timer</button>
        <button class="nav-btn" onclick="switchTab('todo', this)"><span>📝</span> Work</button>
        <button class="nav-btn" onclick="switchTab('srs', this)"><span>🧠</span> Revise</button>
    </nav>

    <script>
        // Tab Switcher
        function switchTab(tab, btnElement) {
            document.querySelectorAll('.app-view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('view-' + tab).classList.add('active');
            btnElement.classList.add('active');
            window.scrollTo(0,0);
        }

        // ================= APP 1: PLANNER =================
        try {
            const days = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];
            const defaultTags = { 't1': { name: 'Focus', color: '#2a64f6' }, 't2': { name: 'Break', color: '#ff3b30' }};
            let tags = JSON.parse(localStorage.getItem('wpk_tags')) || defaultTags;
            let schedule = JSON.parse(localStorage.getItem('wpk_schedule')) || {};
            let isBulkMode = false, selectedCells = [];

            const tHead = document.getElementById('wpk-tableHeader'), tBody = document.getElementById('wpk-tableBody');
            days.forEach(d => { let th = document.createElement('th'); th.innerText = d; tHead.appendChild(th); });
            for(let h=0; h<24; h++) {
                let tr = document.createElement('tr'); let timeStr = `${h%12||12}:00 ${h>=12?'PM':'AM'}`;
                tr.innerHTML = `<td><strong style="color:var(--text-muted); font-size:11px;">${timeStr}</strong></td>`;
                days.forEach(d => { 
                    let td = document.createElement('td'); td.className = 'cell'; td.id = `${d}_${h}`; 
                    td.onclick = () => handleCellClick(td.id, d, timeStr, td); tr.appendChild(td); 
                });
                tBody.appendChild(tr);
            }

            function handleCellClick(id, day, time, el) {
                if(isBulkMode) {
                    if(selectedCells.includes(id)) { selectedCells = selectedCells.filter(c => c !== id); el.classList.remove('bulk-selected'); } 
                    else { selectedCells.push(id); el.classList.add('bulk-selected'); }
                    document.getElementById('wpk-bulkActionPanel').style.display = selectedCells.length ? 'block' : 'none';
                    document.getElementById('bulkCountText').innerText = `${selectedCells.length} Selected`;
                } else {
                    document.getElementById('wpk-modalTitle').innerText = `${day} • ${time}`;
                    let data = schedule[id] || {task:'', tagId:''};
                    document.getElementById('wpk-cellTask').value = data.task; 
                    document.getElementById('wpk-cellTag').value = data.tagId;
                    selectedCells = [id]; document.getElementById('wpk-modal').style.display = 'flex';
                }
            }

            document.getElementById('wpk-bulkBtn').onclick = function() {
                isBulkMode = !isBulkMode; this.innerText = isBulkMode ? "Bulk: ON" : "Bulk: OFF";
                this.style.background = isBulkMode ? "var(--primary)" : "var(--border-color)";
                if(!isBulkMode) cancelBulk();
            };

            function cancelBulk() { selectedCells.forEach(id => document.getElementById(id).classList.remove('bulk-selected')); selectedCells = []; document.getElementById('wpk-bulkActionPanel').style.display = 'none'; }
            document.getElementById('wpk-bulkCancelBtn').onclick = cancelBulk;
            document.getElementById('wpk-bulkEditPopupBtn').onclick = () => { document.getElementById('wpk-modalTitle').innerText = `Editing ${selectedCells.length} Cells`; document.getElementById('wpk-modal').style.display = 'flex'; };
            document.getElementById('wpk-closeBtn').onclick = () => { document.getElementById('wpk-modal').style.display = 'none'; if(isBulkMode) cancelBulk(); };
            
            document.getElementById('wpk-saveBtn').onclick = () => {
                let t = document.getElementById('wpk-cellTask').value.trim(), tag = document.getElementById('wpk-cellTag').value;
                selectedCells.forEach(id => { if(tag) schedule[id] = {task: t, tagId: tag}; else delete schedule[id]; });
                saveP(); document.getElementById('wpk-modal').style.display = 'none'; updateP(); if(isBulkMode) cancelBulk();
            };
            document.getElementById('wpk-clearBtn').onclick = () => { selectedCells.forEach(id => delete schedule[id]); saveP(); document.getElementById('wpk-modal').style.display = 'none'; updateP(); if(isBulkMode) cancelBulk(); };

            document.getElementById('wpk-addTagBtn').onclick = () => {
                let n = document.getElementById('wpk-newTagName').value.trim(), c = document.getElementById('wpk-newTagColor').value;
                if(n) { tags['tag_'+Date.now()] = {name: n, color: c}; document.getElementById('wpk-newTagName').value=''; saveP(); renderTags(); updateP(); }
            };

            window.wpkDeleteTag = (id) => { if(confirm('Delete tag?')) { delete tags[id]; for(let i in schedule) if(schedule[i].tagId===id) delete schedule[i]; saveP(); renderTags(); updateP(); }};
            document.getElementById('wpk-resetBtn').onclick = () => { if(confirm('Reset Plan?')) { tags = JSON.parse(JSON.stringify(defaultTags)); schedule = {}; saveP(); renderTags(); updateP(); }};

            function saveP() { localStorage.setItem('wpk_tags', JSON.stringify(tags)); localStorage.setItem('wpk_schedule', JSON.stringify(schedule)); }
            
            function renderTags() {
                let tC = document.getElementById('wpk-tagsContainer'), sC = document.getElementById('wpk-cellTag');
                tC.innerHTML = ''; sC.innerHTML = '<option value="">-- No Tag --</option>';
                for(let i in tags) { tC.innerHTML += `<div class="tag-item" style="border-left: 4px solid ${tags[i].color}">${tags[i].name} <button class="tag-delete" onclick="wpkDeleteTag('${i}')">✖</button></div>`; sC.innerHTML += `<option value="${i}">${tags[i].name}</option>`; }
            }
            
            function updateP() {
                document.querySelectorAll('.cell').forEach(c => {
                    let d = schedule[c.id];
                    if(d && tags[d.tagId]) { c.innerText = d.task || tags[d.tagId].name; c.style.backgroundColor = tags[d.tagId].color + '30'; c.style.borderLeft = `3px solid ${tags[d.tagId].color}`; c.style.color = '#fff'; }
                    else { c.innerText = ''; c.style.backgroundColor = ''; c.style.borderLeft = ''; }
                });
            }
            renderTags(); updateP();
        } catch(e) { console.log('Planner Error:', e); }

        // ================= APP 2: TIMER =================
        try {
            let ttData = JSON.parse(localStorage.getItem('tt_data')) || { total: -1, remaining: -1, logs: {} };
            let timerInt = null, isRun = false, startT = 0, initialR = 0;
            const disp = document.getElementById('tt-time-display'), bar = document.getElementById('tt-ring-bar');
            
            function fmtTime(s) { if(s<=0) return "00:00:00"; return [Math.floor(s/3600), Math.floor((s%3600)/60), s%60].map(v=>String(v).padStart(2,'0')).join(':'); }
            
            function updTimer() {
                if(ttData.total === -1) { document.getElementById('tt-setup-panel').style.display='block'; document.getElementById('tt-active-panel').style.display='none'; }
                else {
                    document.getElementById('tt-setup-panel').style.display='none'; document.getElementById('tt-active-panel').style.display='block';
                    let r = ttData.remaining; disp.innerText = r > 0 ? fmtTime(r) : "DONE";
                    bar.style.strokeDashoffset = 710 - (Math.max(0, r/ttData.total) * 710);
                    document.getElementById('tt-log-list').innerHTML = Object.keys(ttData.logs).reverse().map(k => `<div class="tt-log-item"><span>${k}</span><strong style="color:var(--success)">${fmtTime(ttData.logs[k])}</strong></div>`).join('');
                }
            }

            document.getElementById('tt-btn-set-target').onclick = () => { let h = parseFloat(document.getElementById('tt-target-hours').value); if(h>0){ ttData.total = Math.floor(h*3600); ttData.remaining = ttData.total; localStorage.setItem('tt_data', JSON.stringify(ttData)); updTimer(); }};
            document.getElementById('tt-btn-start').onclick = () => {
                if(!isRun && ttData.remaining > 0) {
                    isRun=true; document.getElementById('tt-btn-start').disabled=true; document.getElementById('tt-btn-pause').disabled=false;
                    startT=Date.now(); initialR=ttData.remaining;
                    timerInt = setInterval(() => {
                        let sec = Math.floor((Date.now()-startT)/1000); let cR = initialR - sec;
                        if(cR<=0){ clearInterval(timerInt); isRun=false; cR=0; }
                        disp.innerText = fmtTime(cR); bar.style.strokeDashoffset = 710 - ((cR/ttData.total)*710);
                    }, 1000);
                }
            };
            document.getElementById('tt-btn-pause').onclick = () => {
                if(isRun) {
                    isRun=false; clearInterval(timerInt); document.getElementById('tt-btn-start').disabled=false; document.getElementById('tt-btn-pause').disabled=true;
                    let sec = Math.floor((Date.now()-startT)/1000); ttData.remaining = Math.max(0, ttData.remaining-sec);
                    let today = getTodayStr(); ttData.logs[today] = (ttData.logs[today] || 0) + sec;
                    localStorage.setItem('tt_data', JSON.stringify(ttData)); updTimer();
                }
            };
            document.getElementById('tt-btn-clear-all').onclick = () => { if(confirm('Clear Timer?')) { ttData = {total:-1, remaining:-1, logs:{}}; localStorage.setItem('tt_data', JSON.stringify(ttData)); updTimer(); }};
            updTimer();
        } catch(e) { console.log('Timer Error:', e); }

        // ================= APP 3: SYLLABUS =================
        try {
            function rSyll() {
                let d = JSON.parse(localStorage.getItem('syll_data')||'[]');
                document.getElementById('syll-list').innerHTML = d.map((itm, i) => {
                    let subs = (itm.subs||[]).map((s, si) => {
                        let isD = typeof s !== 'string' && s.done; let t = typeof s === 'string' ? s : s.text;
                        return `<div style="display:flex; align-items:center; gap:8px; background:rgba(255,255,255,0.05); padding:8px; border-radius:8px; border:1px solid var(--border-color); margin-top:6px;">
                            <input type="checkbox" ${isD?'checked':''} onchange="tSyllSub(${i},${si})" style="width:16px;height:16px;">
                            <span style="flex:1; font-size:13px; ${isD?'text-decoration:line-through;color:gray':''}">${t}</span>
                            <button onclick="dSyllSub(${i},${si})" style="background:none;border:none;color:red;font-size:16px;">×</button>
                        </div>`;
                    }).join('');
                    return `<div style="background:var(--bg-color); padding:15px; border-radius:12px; margin-bottom:12px; border:1px solid var(--border-color)">
                        <div style="display:flex; justify-content:space-between; margin-bottom:10px;"><strong style="color:var(--primary)">${itm.topic}</strong><button onclick="dSyll(${i})" style="background:none;border:none;color:red;">✖</button></div>
                        <div style="font-size:13px; margin-bottom:10px;">Done: <input type="number" value="${itm.done}" onchange="uSyllHrs(${i},this.value)" style="width:60px; padding:4px; background:var(--card-bg); color:white; border:1px solid var(--border-color);"> / ${itm.total} Hrs</div>
                        <input type="text" placeholder="+ Subtask (Enter)" onkeypress="if(event.key==='Enter' && this.value){ aSyllSub(${i},this.value); this.value=''; }" style="width:100%; padding:10px; border-radius:8px; background:var(--card-bg); border:1px solid var(--border-color); color:white; outline:none;">
                        ${subs}
                    </div>`;
                }).join('');
            }
            document.getElementById('syll-add-btn').onclick = () => {
                let tp = document.getElementById('syll-topic').value, hr = document.getElementById('syll-hours').value;
                if(tp && hr) { let d = JSON.parse(localStorage.getItem('syll_data')||'[]'); d.push({topic:tp, total:hr, done:0, subs:[]}); localStorage.setItem('syll_data', JSON.stringify(d)); document.getElementById('syll-topic').value=''; rSyll(); }
            };
            window.uSyllHrs = (i, v) => { let d = JSON.parse(localStorage.getItem('syll_data')); d[i].done=v; localStorage.setItem('syll_data', JSON.stringify(d)); };
            window.aSyllSub = (i, v) => { let d = JSON.parse(localStorage.getItem('syll_data')); if(typeof d[i].subs[0]==='string') d[i].subs=d[i].subs.map(s=>({text:s, done:false})); d[i].subs.push({text:v, done:false}); localStorage.setItem('syll_data', JSON.stringify(d)); rSyll(); };
            window.tSyllSub = (i, si) => { let d = JSON.parse(localStorage.getItem('syll_data')); if(typeof d[i].subs[si]==='string') d[i].subs[si]={text:d[i].subs[si], done:true}; else d[i].subs[si].done = !d[i].subs[si].done; localStorage.setItem('syll_data', JSON.stringify(d)); rSyll(); };
            window.dSyllSub = (i, si) => { let d = JSON.parse(localStorage.getItem('syll_data')); d[i].subs.splice(si,1); localStorage.setItem('syll_data', JSON.stringify(d)); rSyll(); };
            window.dSyll = (i) => { if(confirm('Delete Topic?')){ let d = JSON.parse(localStorage.getItem('syll_data')); d.splice(i,1); localStorage.setItem('syll_data', JSON.stringify(d)); rSyll(); } };
            rSyll();
        } catch(e) { console.log('Syllabus Error:', e); }

        // ================= APP 4: TO-DO & NOTES =================
        try {
            let todos = JSON.parse(localStorage.getItem('todo_data'))||[];
            function rTodo() { document.getElementById('todo-list-container').innerHTML = todos.map((t,i) => `<div class="list-item ${t.completed?'completed':''}"><div class="item-left" onclick="tTodo(${i})"><div class="custom-checkbox"></div><span class="item-text">${t.text}</span></div><button class="item-delete" onclick="dTodo(${i})">✖</button></div>`).join(''); }
            document.getElementById('todo-add-btn').onclick = () => { let v = document.getElementById('todo-input').value.trim(); if(v){ todos.unshift({text:v, completed:false}); localStorage.setItem('todo_data', JSON.stringify(todos)); document.getElementById('todo-input').value=''; rTodo(); } };
            window.tTodo = i => { todos[i].completed = !todos[i].completed; localStorage.setItem('todo_data', JSON.stringify(todos)); rTodo(); };
            window.dTodo = i => { todos.splice(i,1); localStorage.setItem('todo_data', JSON.stringify(todos)); rTodo(); };
            rTodo();

            let notes = JSON.parse(localStorage.getItem('quick_notes'))||[], eIdx = -1;
            const nInp = document.getElementById('note-input'), nBtn = document.getElementById('note-add-btn');
            function rNotes() { document.getElementById('notes-list-container').innerHTML = notes.map((n,i) => `<div class="note-card"><div class="note-text">${n.text}</div><div class="note-actions"><button onclick="eNote(${i})" style="background:var(--primary); border:none; color:white; padding:5px; border-radius:5px;">✏️</button><button onclick="dNote(${i})" style="background:var(--danger); border:none; color:white; padding:5px; border-radius:5px;">✖</button></div></div>`).join(''); }
            nBtn.onclick = () => {
                let v = nInp.innerHTML.trim();
                if(v && v!=='<br>') {
                    if(eIdx > -1) { notes[eIdx].text = v; eIdx = -1; nBtn.innerText = 'Save Note'; } else { notes.unshift({text:v}); }
                    nInp.innerHTML = ''; localStorage.setItem('quick_notes', JSON.stringify(notes)); rNotes();
                }
            };
            window.eNote = i => { nInp.innerHTML = notes[i].text; eIdx=i; nBtn.innerText='Update Note'; window.scrollTo(0, nInp.offsetTop); };
            window.dNote = i => { if(confirm('Delete Note?')){ if(eIdx===i){ eIdx=-1; nBtn.innerText='Save Note'; nInp.innerHTML=''; } notes.splice(i,1); localStorage.setItem('quick_notes', JSON.stringify(notes)); rNotes(); } };
            rNotes();
        } catch(e) { console.log('Todo/Notes Error:', e); }

        // ================= APP 5: REVISION =================
        try {
            function rSrs() {
                let d = JSON.parse(localStorage.getItem('srs_data_v2')||'[]');
                document.getElementById('srs-list-container').innerHTML = d.map((itm, i) => `<div class="card" style="padding:15px; margin-bottom:10px;"><div style="display:flex; justify-content:space-between; margin-bottom:10px;"><strong style="color:var(--primary)">${itm.topic}</strong><button onclick="dSrs(${i})" style="background:none;border:none;color:red;">✖</button></div></div>`).join('');
            }
            document.getElementById('srs-add-btn').onclick = () => {
                let t = document.getElementById('srs-input').value, c = document.getElementById('srs-custom-date').value;
                if(t && c) { let d = JSON.parse(localStorage.getItem('srs_data_v2')||'[]'); d.unshift({topic:t, rc:c}); localStorage.setItem('srs_data_v2', JSON.stringify(d)); rSrs(); }
            };
            window.dSrs = i => { let d = JSON.parse(localStorage.getItem('srs_data_v2')); d.splice(i,1); localStorage.setItem('srs_data_v2', JSON.stringify(d)); rSrs(); };
            rSrs();
        } catch(e) { console.log('SRS Error:', e); }

        // ================= CLOUD SYNC =================
        try {
            document.getElementById('cloud-save-btn').onclick = async function() {
                let id = document.getElementById('kvdb-bucket-id').value.trim(); if(!id) return alert("Enter Bucket ID!");
                localStorage.setItem('kvdb_bucket_id', id);
                let data = {
                    wpk_tags: localStorage.getItem('wpk_tags'), wpk_schedule: localStorage.getItem('wpk_schedule'),
                    tt_data: localStorage.getItem('tt_data'), todo_data: localStorage.getItem('todo_data'),
                    quick_notes: localStorage.getItem('quick_notes'), srs_data_v2: localStorage.getItem('srs_data_v2'), syll_data: localStorage.getItem('syll_data')
                };
                this.innerText = "Saving...";
                let res = await fetch(`https://kvdb.io/${id}/focusdata`, { method: 'PUT', headers: {'Content-Type':'application/json'}, body: JSON.stringify(data) });
                if(res.ok) alert("✅ Cloud Sync Success!"); else alert("❌ Error saving to cloud.");
                this.innerText = "Save to Cloud";
            };

            document.getElementById('cloud-load-btn').onclick = async function() {
                let id = document.getElementById('kvdb-bucket-id').value.trim(); if(!id) return alert("Enter Bucket ID!");
                localStorage.setItem('kvdb_bucket_id', id);
                this.innerText = "Loading...";
                let res = await fetch(`https://kvdb.io/${id}/focusdata?t=${Date.now()}`);
                if(res.ok) {
                    let d = await res.json();
                    if(d.wpk_tags) localStorage.setItem('wpk_tags', d.wpk_tags);
                    if(d.wpk_schedule) localStorage.setItem('wpk_schedule', d.wpk_schedule);
                    if(d.tt_data) localStorage.setItem('tt_data', d.tt_data);
                    if(d.todo_data) localStorage.setItem('todo_data', d.todo_data);
                    if(d.quick_notes) localStorage.setItem('quick_notes', d.quick_notes);
                    if(d.srs_data_v2) localStorage.setItem('srs_data_v2', d.srs_data_v2);
                    if(d.syll_data) localStorage.setItem('syll_data', d.syll_data);
                    alert("✅ Data Loaded! Restarting..."); window.location.reload();
                } else { alert("❌ Error loading data."); }
                this.innerText = "Load Data";
            };
            document.getElementById('kvdb-bucket-id').value = localStorage.getItem('kvdb_bucket_id') || '';
        } catch(e) { console.log('Cloud Error:', e); }

    </script>
</body>
</html>
